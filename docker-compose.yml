services:
  topaz:
    build: .
    image: jt7777/topaz:latest
    ports:
      - "3921:3921"
    volumes:
      - topaz_data:/data
    environment:
      TOPAZ_DATA_DIR: /data
      TOPAZ_GEMS_DIR: /data/gems
      PORT: "3921"
      TOPAZ_HUB: "true"
      TOPAZ_NO_BONJOUR: "true"
      TOPAZ_BUILD: "2026-06-16"
    restart: unless-stopped

volumes:
  topaz_data:
