# Portainer — use an explicit version tag after each publish (not only :latest).
# Example: jt7777/topaz:44e2f28
# Publish: ./scripts/publish-jt7777.sh (builds Intel + ARM, pushes both tags)

services:
  topaz:
    image: jt7777/topaz:44e2f28
    pull_policy: always
    ports:
      - "3921:3921"
    volumes:
      - topaz_data:/data
    environment:
      TOPAZ_DATA_DIR: /data
      TOPAZ_VAULTS_DIR: /data/vaults
      PORT: "3921"
      TOPAZ_HUB: "true"
      TOPAZ_NO_BONJOUR: "true"
    restart: unless-stopped

volumes:
  topaz_data:
