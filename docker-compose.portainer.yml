# Portainer stack — pulls from Docker Hub (jt7777/topaz).
# Repository: https://github.com/CarShyne/Topaz
# Compose path: docker-compose.portainer.yml
#
# After code changes, maintainers run: ./scripts/publish-jt7777.sh
# Then in Portainer: Pull and redeploy this stack.

services:
  topaz:
    image: jt7777/topaz:latest
    pull_policy: always
    ports:
      - "3921:3921"
    volumes:
      - topaz_data:/data
    environment:
      TOPAZ_DATA_DIR: /data
      TOPAZ_VAULTS_DIR: /data/vaults
      PORT: "3921"
      TOPAZ_HUB: "true"
      TOPAZ_NO_BONJOUR: "true"
    restart: unless-stopped

volumes:
  topaz_data:
