# Portainer stack — pulls jt7777/topaz from Docker Hub.
# Repository: https://github.com/CarShyne/Topaz
# Compose path: docker-compose.portainer.yml
#
# ONLY jt7777/topaz:latest exists until you run ./scripts/publish-jt7777.sh on your Mac.
# Do NOT use commit tags like :ae5e318 unless publish just created that tag.

services:
  topaz:
    image: jt7777/topaz:latest
    pull_policy: always
    ports:
      - "3921:3921"
    volumes:
      - topaz_data:/data
    environment:
      TOPAZ_DATA_DIR: /data
      TOPAZ_VAULTS_DIR: /data/vaults
      PORT: "3921"
      TOPAZ_HUB: "true"
      TOPAZ_NO_BONJOUR: "true"
    restart: unless-stopped

volumes:
  topaz_data:
