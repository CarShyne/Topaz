# Use this file in Portainer (recommended).
# Repository: https://github.com/CarShyne/Topaz
# Compose path: docker-compose.portainer.yml
# Reference: refs/heads/main
#
# GitHub Actions builds the image on every push to main.
# Portainer only pulls the image — no local build, no permission issues.

services:
  topaz:
    image: ghcr.io/carshyne/topaz:latest
    pull_policy: always
    ports:
      - "3921:3921"
    volumes:
      - topaz_data:/data
    environment:
      TOPAZ_DATA_DIR: /data
      TOPAZ_VAULTS_DIR: /data/vaults
      PORT: "3921"
      TOPAZ_HUB: "true"
      TOPAZ_NO_BONJOUR: "true"
    restart: unless-stopped

volumes:
  topaz_data:
