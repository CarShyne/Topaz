# Portainer on Raspberry Pi / OMV — image tag is updated by ./scripts/publish-jt7777.sh
# After publish, Pull and redeploy this stack in Portainer (or run scripts/pi-force-update.sh on the Pi)

services:
  topaz:
    image: jt7777/topaz:release-20260618-165007
    pull_policy: always
    ports:
      - "3921:3921"
    volumes:
      - topaz_data:/data
    environment:
      TOPAZ_DATA_DIR: /data
      TOPAZ_GEMS_DIR: /data/gems
      PORT: "3921"
      TOPAZ_HUB: "true"
      TOPAZ_NO_BONJOUR: "true"
    restart: unless-stopped

volumes:
  topaz_data:
